<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HisaabPro — Login</title>
  <meta name="description" content="Sign in to continue to your HisaabPro workspace." />
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
<div class="auth-layout">
  <!-- Visual Panel -->
  <div class="auth-visual">
    <div class="auth-brand">
      <div class="auth-brand-icon">H</div>
      <span class="auth-brand-name">HisaabPro</span>
    </div>
    <h1 class="auth-headline">Welcome to your workspace.</h1>
    <p class="auth-subtext">Sign in to load your account, preferences, and store data.</p>
  </div>

  <!-- Form Panel -->
  <div class="auth-form-panel">
    <div style="max-width:400px;margin:0 auto;width:100%">
      <h1 class="auth-form-title">Welcome back</h1>
      <p class="auth-form-subtitle">Loading-ready sign in for your account</p>
      <div id="authStatus" class="alert alert-danger" style="display:none;margin-bottom:16px"></div>

      <form id="loginForm">
        <div class="form-group">
          <label class="form-label" for="email">Email address <span>*</span></label>
          <div class="input-group">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
            <input type="email" id="email" class="form-input" placeholder="you@example.com" required autocomplete="email" />
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password <span>*</span></label>
          <div class="input-group">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
            <input type="password" id="password" class="form-input" placeholder="••••••••" required autocomplete="current-password" />
            <span class="input-suffix toggle-password">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </span>
          </div>
        </div>

        <div class="flex justify-between items-center" style="margin-bottom:24px">
          <label style="display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text-secondary);cursor:pointer">
            <input type="checkbox" id="rememberMe" style="accent-color:var(--emerald);width:15px;height:15px" />
            Remember me
          </label>
          <a href="#" style="font-size:13px;color:var(--emerald);font-weight:600">Forgot password?</a>
        </div>

        <button type="submit" class="btn btn-primary btn-pill-lg">Sign In</button>
      </form>

      <p class="auth-footer-text">
        Don't have an account? <a href="register.html">Create one free</a>
      </p>
    </div>
  </div>
</div>

<script src="assets/js/main.js"></script>
<script src="/supabase-config.js?v=20260418"></script>
<script src="assets/js/supabase-client.js?v=20260418"></script>
<script src="assets/js/auth.js?v=20260418"></script>
</body>
</html>
